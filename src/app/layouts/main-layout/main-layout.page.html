<div class="min-h-screen flex flex-col">
  <!-- Top Navbar -->
  <header
    class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-between px-4 sticky top-0 z-50">
    <div class="flex items-center gap-8">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-primary-500 rounded-lg flex items-center justify-center text-white font-bold">L</div>
        <span
          class="text-xl font-bold tracking-tight text-slate-900 dark:text-white hidden sm:block">LogiDispatch</span>
      </div>

      <!-- Tenant Selector -->
      <div class="relative group hidden md:block">
        <button
          class="flex items-center gap-2 px-3 py-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 text-sm font-medium transition-colors">
          <span>Main Logistics Hub</span>
          <span class="material-symbols-rounded text-sm">expand_more</span>
        </button>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <!-- Dark Mode Toggle -->
      <button (click)="themeService.toggleDarkMode()"
        class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors">
        <span class="material-symbols-rounded">{{ themeService.darkMode() ? 'light_mode' : 'dark_mode' }}</span>
      </button>

      <!-- Notifications -->
      <button
        class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 relative">
        <span class="material-symbols-rounded">notifications</span>
        <span
          class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></span>
      </button>

      <!-- User Profile -->
      <div class="flex items-center gap-3 pl-4 border-l border-slate-200 dark:border-slate-800">
        <div class="text-right hidden sm:block">
          <p class="text-sm font-semibold text-slate-900 dark:text-white leading-none">John Doe</p>
          <p class="text-xs text-slate-500 dark:text-slate-400">Administrator</p>
        </div>
        <div
          class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-slate-600 dark:text-slate-300 overflow-hidden">
          <img src="https://picsum.photos/seed/user/100/100" referrerpolicy="no-referrer" alt="User">
        </div>
      </div>

      <!-- Mobile Menu Toggle -->
      <button (click)="isSidebarOpen.set(!isSidebarOpen())"
        class="lg:hidden p-2 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800">
        <span class="material-symbols-rounded">menu</span>
      </button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside [class.translate-x-0]="isSidebarOpen()" [class.-translate-x-full]="!isSidebarOpen()"
      class="fixed inset-y-0 left-0 z-40 w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transform transition-transform duration-300 lg:relative lg:translate-x-0 pt-16 lg:pt-0">
      <nav class="p-4 space-y-1">
        @for (item of menuItems; track item.label) {
        <a [routerLink]="item.link"
          routerLinkActive="bg-primary-50 text-primary-600 dark:bg-primary-900/20 dark:text-primary-400"
          [routerLinkActiveOptions]="{exact: item.exact}"
          class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all group">
          <span class="material-symbols-rounded text-xl group-hover:scale-110 transition-transform">{{ item.icon
            }}</span>
          <span>{{ item.label }}</span>
        </a>
        }
      </nav>

      <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-slate-200 dark:border-slate-800">
        <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4">
          <p class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">System
            Status</p>
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-xs text-slate-600 dark:text-slate-300">All systems operational</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto bg-slate-50 dark:bg-slate-950 p-4 md:p-8">
      <ion-router-outlet></ion-router-outlet>
    </main>
  </div>

  <!-- Mobile Overlay -->
  @if (isSidebarOpen()) {
  <button (click)="isSidebarOpen.set(false)"
    class="fixed inset-0 bg-black/50 z-30 lg:hidden backdrop-blur-sm border-none w-full h-full cursor-default"
    aria-label="Close sidebar"></button>
  }
</div>
